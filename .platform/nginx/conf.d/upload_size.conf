# Allow phone-photo uploads (owner 2026-07-02): nginx's default client_max_body_size is 1MB, so
# any normal phone picture (3-10MB) was rejected with 413 BEFORE reaching Django - users only saw
# a generic "failed to upload". 20MB covers every image path (esport images, team logos, OCR
# screenshots, room-file uploads); Django views still enforce their own per-field limits with
# clear error messages.
client_max_body_size 20M;
